let authReadyPromise = null;
function waitForAuthReady() {
  if (!authEnabled) return Promise.resolve();
  if (!authReadyPromise) {
    authReadyPromise = new Promise((resolve) => {
      const unsub = onAuthStateChanged(firebaseAuth, () => {
        unsub();
        resolve();
      });
    });
  }
  return authReadyPromise;
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error("timed out")), ms)),
  ]);
}

async function authedUrl(path) {
  if (!authEnabled) return `${FIREBASE_URL}${path}`;
  try {
    await withTimeout(waitForAuthReady(), 4000); // restores a persisted session from local storage — needs no network
    if (!firebaseAuth.currentUser) await withTimeout(signInAnonymously(firebaseAuth), 4000);
    const token = await withTimeout(firebaseAuth.currentUser.getIdToken(), 4000);
    const sep = path.includes("?") ? "&" : "?";
    return `${FIREBASE_URL}${path}${sep}auth=${token}`;
  } catch (e) {
    // Auth hung or failed (e.g. no network at all) — surface this as a clean
    // network error so callers fall into their normal offline-queue handling
    // instead of the button appearing to hang forever.
    const err = new Error("Auth unavailable — likely offline");
    err.isNetworkError = true;
    throw err;
  }
}

const BABY_BIRTH_DATE = "2026-05-13";

function babyAgeSummary(nowDate) {
  const days = Math.floor((keyToUTCms(dayKey(nowDate)) - keyToUTCms(BABY_BIRTH_DATE)) / 86400000);
  if (days < 0) return "";
  const weeks = Math.floor(days / 7);
  const months = Math.floor(days / 30.44);
  return `Baby was born ${BABY_BIRTH_DATE} and is currently ${days} days old (about ${weeks} weeks${months >= 1 ? `, roughly ${months} month${months === 1 ? "" : "s"}` : ""} old).`;
}
function renderBoldText(text) {
  if (!text) return text;
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return h("strong", { key: i, style: { color: "var(--text-primary)", fontWeight: 700 } }, part.slice(2, -2));
    }
    return part;
  });
}
function babyAgeShort(nowDate) {
  const days = Math.floor((keyToUTCms(dayKey(nowDate)) - keyToUTCms(BABY_BIRTH_DATE)) / 86400000);
  if (days < 0) return "";
  const weeks = Math.floor(days / 7);
  const remDays = days % 7;
  const months = Math.floor(days / 30.44);
  if (months >= 2) return `${months} months old`;
  return `${weeks}w ${remDays}d old`;
}

function computeInsightSlot(nowDate) {
  const p = tzParts(nowDate);
  const today = dayKey(nowDate);
  if (p.hour < 6) return `${shiftDayKey(today, -1)}-evening`;
  if (p.hour < 18) return `${today}-morning`;
  return `${today}-evening`;
}

async function generateChatReply(messages, apiKey) {
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: GROQ_MODEL,
      temperature: 0.7,
      max_tokens: 500,
      messages,
    }),
  });
  if (!res.ok) {
    const errBody = await res.text().catch(() => "");
    throw new Error(`Groq request failed (${res.status}): ${errBody.slice(0, 200)}`);
  }
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content || "";
  if (!text) throw new Error("empty response");
  return text.trim();
}

async function generateInsightText(summary, systemPrompt, apiKey) {

async function safeFetch(url, options) {
  let res;
  try {
    res = await withTimeout(fetch(url, { ...options, cache: "no-store" }), 6000);
  } catch (networkErr) {
    const err = new Error("Network unreachable");
    err.isNetworkError = true;
    throw err;
  }
  if (!res.ok) {
    const body = await res.text().catch(() => "");
    const err = new Error(`Request rejected (${res.status}): ${body.slice(0, 150)}`);
    err.isNetworkError = false;
    err.status = res.status;
    throw err;
  }
  return res;
}

// buckets, and displayed times — regardless of each device's own clock
// settings. Based on your current UTC+7 offset (Vietnam/Thailand/etc, no DST).
// If this is wrong for where you actually are, tell me and I'll change it.
const APP_TIMEZONE = "Asia/Bangkok";
const APP_TZ_OFFSET_MINUTES = 420; // UTC+7, no DST — used to convert picked wall-clock time to a correct instant

function tzWallTimeToISO(dateKey, hour, minute) {
  const [y, m, d] = dateKey.split("-").map(Number);
  const utcMs = Date.UTC(y, m - 1, d, hour, minute) - APP_TZ_OFFSET_MINUTES * 60000;
  return new Date(utcMs).toISOString();
}

function tzParts(d) {
  const dtf = new Intl.DateTimeFormat("en-US", {
    timeZone: APP_TIMEZONE,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
  });
  const map = {};
  dtf.formatToParts(new Date(d)).forEach((p) => { map[p.type] = p.value; });
  let hour = parseInt(map.hour, 10);
  if (hour === 24) hour = 0;
  return {
    year: parseInt(map.year, 10),
    month: parseInt(map.month, 10),
    day: parseInt(map.day, 10),
    hour,
    minute: parseInt(map.minute, 10),
  };
}
function hourInTZ(d) {
  return tzParts(d).hour;
}

function isRecentEntry(entry, withinMs = 120000) {

function mergeById(latest, local) {
  const map = new Map();
  latest.forEach((e) => map.set(e.id, e));
  local.forEach((e) => {
    if (!map.has(e.id) && isRecentEntry(e)) map.set(e.id, e);

  return Array.from(map.values());
}
function dayKey(d) {
  const p = tzParts(d);

function TimeWheelColumn({ values, value, onChange, format }) {
  const itemH = 30;
  const visibleH = 90;
  const pad = (visibleH - itemH) / 2;
  const containerRef = useRef(null);
  const scrollTimeout = useRef(null);

  useEffect(() => {
    const idx = values.indexOf(value);
    const el = containerRef.current;
    if (!el || idx < 0) return;
    // Deferred via rAF: on a genuinely fresh mount, the browser hasn't yet
    // established scroll-snap layout for this element, and an immediate
    // scrollTop assignment can get fought back toward 0 before it sticks.
    // One frame is enough for snap layout to settle first.
    const raf = requestAnimationFrame(() => {
      el.scrollTop = idx * itemH;
    });
    return () => cancelAnimationFrame(raf);
  }, [value]);

  function settleToNearest() {
    const el = containerRef.current;
    if (!el) return;
    const idx = Math.max(0, Math.min(values.length - 1, Math.round(el.scrollTop / itemH)));
    if (values[idx] !== value) onChange(values[idx]);
  }

  function handleScroll() {
    if (scrollTimeout.current) clearTimeout(scrollTimeout.current);
    scrollTimeout.current = setTimeout(settleToNearest, 160);
  }

  function jumpTo(v) {
    const idx = values.indexOf(v);
    const el = containerRef.current;
    if (el && idx >= 0) el.scrollTo({ top: idx * itemH, behavior: "smooth" });
    onChange(v);
  }

  return h(
    "div",
    { className: "relative", style: { width: 56 } },
    h("div", {
      className: "pointer-events-none absolute left-0 right-0 top-1/2 -translate-y-1/2 z-10 border-y border-[#F2C879]/40 bg-[#F2C879]/5",
      style: { height: itemH },
    }),
    h(
      "div",
      {
        ref: containerRef,
        onScroll: handleScroll,
        className: "overflow-y-scroll no-scrollbar",
        style: { height: visibleH, scrollSnapType: "y proximity" },
      },
      h("div", { style: { height: pad } }),
      values.map((v) => {
        const isSelected = v === value;
        const isMarked = v % 10 === 0;
        return h(
          "div",
          {
            key: v,
            onClick: () => jumpTo(v),
            className: "flex items-center justify-center font-mono cursor-pointer",
            style: {
              height: itemH,
              scrollSnapAlign: "center",
              fontSize: isSelected ? "17px" : isMarked ? "14px" : "13px",
              fontWeight: isSelected ? 700 : isMarked ? 600 : 400,
              color: isSelected ? "var(--text-primary)" : isMarked ? "var(--text-secondary)" : "#8286B8",
            },
          },
          format ? format(v) : v
        );
      }),
      h("div", { style: { height: pad } })
    )
  );
}

function VolumeWheel({ value, onChange, min = 30, max = 160, step = 5, color = "var(--gold-text)", lineColor = "#F2C879" }) {
  const values = [];
  for (let v = min; v <= max; v += step) values.push(v);
  const itemW = 26;
  const [visibleW, setVisibleW] = useState(280);
  const wrapRef = useRef(null);
  const pad = Math.max(0, (visibleW - itemW) / 2);
  const containerRef = useRef(null);
  const scrollTimeout = useRef(null);

  const userInteracted = useRef(false);

  useEffect(() => {
    function measure() {
      if (wrapRef.current) setVisibleW(wrapRef.current.clientWidth);
    }
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  // Center the selected tick under the fixed center line. This must run once
  // the container has been measured (visibleW/pad settle a tick after mount),
  // not just on first mount when visibleW is still the 280px placeholder —
  // that stale width was leaving every wheel scrolled off-center. We keep
  // re-centering to the current value until the user actually scrolls.
  useEffect(() => {
    if (userInteracted.current) return;
    const idx = values.indexOf(value);
    if (containerRef.current && idx >= 0) {
      containerRef.current.scrollLeft = idx * itemW;
    }
  }, [visibleW, value, values.length]);

  function settleToNearest() {
    const el = containerRef.current;
    if (!el) return;
    const idx = Math.max(0, Math.min(values.length - 1, Math.round(el.scrollLeft / itemW)));
    // Native CSS scroll-snap already settles the visual position — we just
    // sync the value, rather than issuing a second competing scrollTo(),
    // which is what was causing the jerky double-snap feel.
    if (values[idx] !== value) onChange(values[idx]);
  }

  function handleScroll() {
    userInteracted.current = true;
    if (scrollTimeout.current) clearTimeout(scrollTimeout.current);
    scrollTimeout.current = setTimeout(settleToNearest, 160);
  }

  function jumpTo(v) {
    userInteracted.current = true;
    const idx = values.indexOf(v);
    const el = containerRef.current;
    if (el && idx >= 0) el.scrollTo({ left: idx * itemW, behavior: "smooth" });
    onChange(v);
  }

  return h(
    "div",
    { className: "select-none mb-3" },
    h(
      "div",
      { className: "text-center mb-1.5" },
      h("span", { className: "text-3xl", style: { fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600 } }, value),
      h("span", { className: "text-sm text-[var(--text-muted)] font-mono ml-1" }, "ml")
    ),
    h(
      "div",
      {
        ref: wrapRef,
        className: "relative w-full rounded-2xl",
        style: {
          padding: "12px 0",
          background: "linear-gradient(180deg, var(--surface-2) 0%, var(--card-bg) 55%, var(--surface-2) 100%)",
          boxShadow: "inset 0 3px 8px rgba(0,0,0,0.35), inset 0 -2px 4px rgba(255,255,255,0.04)",
        },
      },
      h("div", {
        className: "pointer-events-none absolute left-1/2 -translate-x-1/2 top-2 bottom-2 w-0.5 z-10 rounded",
        style: { background: lineColor, boxShadow: `0 0 6px ${lineColor}B3` },
      }),
      h(
        "div",
        {
          ref: containerRef,
          onScroll: handleScroll,
          className: "overflow-x-scroll no-scrollbar flex",
          style: { width: "100%", scrollSnapType: "x proximity", scrollBehavior: "smooth" },
        },
        h("div", { style: { width: pad, flexShrink: 0 } }),
        values.map((v) => {
          const isMajor = v % 10 === 0;
          const isSelected = v === value;
          return h(
            "div",
            {
              key: v,
              onClick: () => jumpTo(v),
              className: "flex flex-col items-center justify-end cursor-pointer flex-shrink-0",
              style: { width: itemW, height: 38, scrollSnapAlign: "center" },
            },
            h("div", {
              style: {
                width: isSelected ? 3 : isMajor ? 2 : 1.5,
                height: isSelected ? 22 : isMajor ? 20 : 9,
                background: isSelected
                  ? lineColor
                  : isMajor

                boxShadow: isSelected ? `0 0 5px ${lineColor}A6` : "none",
              },
            }),
            h(
              "span",
              { className: "text-[8px] font-mono mt-1", style: { color: isSelected ? color : "var(--text-muted)", visibility: isMajor ? "visible" : "hidden", fontWeight: isSelected ? 700 : 400 } },
              v

        }),
        h("div", { style: { width: pad, flexShrink: 0 } })

  );
}

function AnimatedNumber({ value }) {
  const str = String(value);
  const target = parseFloat(str);
  const decimals = str.includes(".") ? str.split(".")[1].length : 0;
  const [display, setDisplay] = useState(target);
  const prevRef = useRef(target);
  const rafRef = useRef(null);

  useEffect(() => {
    if (isNaN(target)) return;
    const start = prevRef.current;
    if (start === target) {
      setDisplay(target);
      return;
    }
    const startTime = performance.now();
    const duration = 500;
    function tick(now) {
      const t = Math.min(1, (now - startTime) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(start + (target - start) * eased);
      if (t < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        setDisplay(target);
        prevRef.current = target;
      }
    }
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [target]);

  if (isNaN(target)) return str;
  return decimals > 0 ? display.toFixed(decimals) : String(Math.round(display));
}

          "g",
          { key: p.label },
          h("circle", { cx: p.x, cy: p.y, r: i === currentIndex ? 4 : 3, fill: i === currentIndex ? "#F2C879" : PATTERN_COLOR }),
          h(
            "text",
            { x: p.x, y: Math.max(9, p.y - 8), fontSize: 8, fill: i === currentIndex ? "var(--gold-text)" : "var(--text-tertiary)", textAnchor: "middle", fontFamily: "monospace", fontWeight: i === currentIndex ? "bold" : "normal" },
            `${p.pct}%`
          ),
          h(
            "text",
            { x: p.x, y: height - 6, fontSize: 8, fill: i === currentIndex ? "var(--gold-text)" : "var(--text-muted)", textAnchor: "middle", fontFamily: "monospace", fontWeight: i === currentIndex ? "bold" : "normal" },
            p.label
          )
        )
      )
    )
  );
}

function AvgVolumeChart({ data, height, currentIndex, unit = "ml", noun = "feed", color = VOLUME_COLOR }) {

  return h(
    "div",
    { className: "flex items-start justify-between gap-1.5 px-2", style: { height } },

/* ---------- APP ---------- */
function buildInsightSummary(entries, nowDate, weightKg, growthRecords) {
  const sorted = [...entries].sort((a, b) => new Date(a.time) - new Date(b.time));
  const now = nowDate;
  const todayKeyNow = dayKey(now);
  const last7Cutoff = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const last7 = sorted.filter((e) => new Date(e.time) >= last7Cutoff);

  const todayEntries = sorted.filter((e) => dayKey(new Date(e.time)) === todayKeyNow);
  const todayTotalMl = todayEntries.reduce((s, e) => s + (e.volumeMl || 0), 0);

  const gaps = [];
  const gapsDay = [];
  const gapsNight = [];
  for (let i = 1; i < last7.length; i++) {
    const gap = (new Date(last7[i].time) - new Date(last7[i - 1].endTime || last7[i - 1].time)) / 60000;
    gaps.push(gap);
    const endHour = hourInTZ(last7[i].time);
    if (endHour >= 18 || endHour < 6) gapsNight.push(gap);
    else gapsDay.push(gap);
  }
  const avgIntervalMins = gaps.length ? Math.round(gaps.reduce((a, b) => a + b, 0) / gaps.length) : null;
  const avgIntervalDayMins = gapsDay.length ? Math.round(gapsDay.reduce((a, b) => a + b, 0) / gapsDay.length) : null;
  const avgIntervalNightMins = gapsNight.length ? Math.round(gapsNight.reduce((a, b) => a + b, 0) / gapsNight.length) : null;
  const last7Volumed = last7.filter((e) => e.volumeMl != null);
  const avgVolume = last7Volumed.length ? Math.round(last7Volumed.reduce((s, e) => s + e.volumeMl, 0) / last7Volumed.length) : null;

  let dayMl = 0, nightMl = 0;
  last7.forEach((e) => {
    const hh = hourInTZ(e.time);
    if (hh >= 6 && hh < 18) dayMl += e.volumeMl;
    else nightMl += e.volumeMl;
  });
  const splitTotal = dayMl + nightMl;
  const dayPct = splitTotal ? Math.round((dayMl / splitTotal) * 100) : null;

  const lastEntry = sorted[sorted.length - 1];
  const minsSinceLast = lastEntry ? Math.round((now - new Date(lastEntry.time)) / 60000) : null;

  const last3DayTotals = [];
  for (let i = 0; i < 3; i++) {
    const key = shiftDayKey(todayKeyNow, -i);
    const dayEntries = sorted.filter((e) => dayKey(new Date(e.time)) === key);
    last3DayTotals.push(`${key}: ${dayEntries.reduce((s, e) => s + (e.volumeMl || 0), 0)}ml over ${dayEntries.length} feeds`);
  }

  const yesterdayKey = shiftDayKey(todayKeyNow, -1);
  const yesterdayEntries = sorted.filter((e) => dayKey(new Date(e.time)) === yesterdayKey);
  const yesterdayTotalMl = yesterdayEntries.reduce((s, e) => s + (e.volumeMl || 0), 0);
  const avgDailyMl7 = last7.length
    ? Math.round(
        Array.from({ length: 7 }, (_, i) => shiftDayKey(todayKeyNow, -i))
          .map((key) => sorted.filter((e) => dayKey(new Date(e.time)) === key).reduce((s, e) => s + (e.volumeMl || 0), 0))
          .reduce((a, b) => a + b, 0) / 7
      )
    : null;

  const maxGapMins = gaps.length ? Math.round(Math.max(...gaps)) : null;

  const last14Cutoff = new Date(now.getTime() - 14 * 24 * 60 * 60 * 1000);
  const last14 = sorted.filter((e) => new Date(e.time) >= last14Cutoff && e.volumeMl != null);
  const rawBuckets = Array.from({ length: 8 }, (_, i) => ({ hourStart: i * 3, volumes: [] }));
  last14.forEach((e) => {
    const idx = Math.floor(hourInTZ(e.time) / 3);
    rawBuckets[idx].volumes.push(e.volumeMl);
  });
  const bucketStats = rawBuckets.map((b) => {
    const count = b.volumes.length;
    return {
      hourStart: b.hourStart,
      count,
      avg: count ? Math.round(b.volumes.reduce((a, c) => a + c, 0) / count) : 0,
      min: count ? Math.min(...b.volumes) : 0,
      max: count ? Math.max(...b.volumes) : 0,
    };
  });
  const bucketSummary = bucketStats
    .map((b) => {
      const isNightWindow = b.hourStart < 6 || b.hourStart >= 18;
      return `${b.hourStart}-${b.hourStart + 3}h (${isNightWindow ? "overnight — naturally lower" : "daytime"}) avg ${b.avg}ml, typical range ${b.count ? `${b.min}-${b.max}ml` : "n/a"} (${b.count} feeds)`;
    })
    .join("; ");

  const currentHour = hourInTZ(now);
  const currentBucketIdx = Math.floor(currentHour / 3);
  const dayFractionElapsed = Math.round((currentHour / 24) * 100);

  // Decide the top-up recommendation in code (reliable arithmetic) rather than
  // leaving multi-step reasoning to the model, which tends toward false
  // precision (e.g. suggesting adjustments smaller than normal feed-to-feed
  // variance, or forecasting a "daily total" late at night when the next
  // real event is an overnight sleep stretch, not another data point today).
  const windowsRemainingToday = Math.max(0, 7 - currentBucketIdx);
  const lateInDay = currentHour >= 21;
  const expectedSoFarMl = bucketStats.slice(0, currentBucketIdx).reduce((sum, b) => sum + b.avg, 0);
  const shortfallMl = expectedSoFarMl - todayTotalMl;
  const nextBucket = !lateInDay && windowsRemainingToday >= 1 ? bucketStats[currentBucketIdx + 1] : null;
  const minMeaningfulTopUp = nextBucket ? Math.max(15, Math.round(nextBucket.avg * 0.25)) : null;
  const topUpJustified = nextBucket && shortfallMl > minMeaningfulTopUp;
  const recommendationDirective =
    lateInDay || windowsRemainingToday < 1
      ? "SIGNAL A: It is late enough in the day (or too few feeding windows remain before the typical overnight stretch) that you must NOT propose any specific top-up amount. Only describe, in past tense, whether today's overall pattern looked typical — do not invent an adjustment."
      : topUpJustified
      ? `SIGNAL A: A top-up may be mentioned. Expected-so-far is ~${expectedSoFarMl}ml vs actual ${todayTotalMl}ml (shortfall ~${shortfallMl}ml), which exceeds the minimum meaningful threshold of ${minMeaningfulTopUp}ml for the next window (${nextBucket.hourStart}-${nextBucket.hourStart + 3}h, typical range ${nextBucket.min}-${nextBucket.max}ml). If you mention an amount, it must fall within or near that window's typical range and must NOT be smaller than ${minMeaningfulTopUp}ml — anything smaller is normal feed-to-feed noise for this baby, not a real recommendation.`
      : `SIGNAL A: Do NOT propose a top-up. Today's pace (~${expectedSoFarMl}ml expected so far vs ${todayTotalMl}ml actual) is within normal noise — say plainly that today looks on pace.`;

  const generalRangeLine = weightKg
    ? `General loose reference only (not a rule, and secondary to the weight-trend signal below if they seem to disagree): a commonly-cited rough guideline is about 150-200 ml per kg of body weight per day for many formula/mixed-fed infants before solids are introduced, which for ${weightKg} kg works out to roughly ${Math.round(weightKg * 150)}-${Math.round(weightKg * 200)} ml/day — treat this as a wide sanity-check band, not a target. This ratio becomes less meaningful once solid foods are introduced (roughly 4-6 months), since milk intake naturally levels off as solids contribute more of total nutrition.`
    : "";

  // Weight trend — the actual gold-standard signal for "is feeding going
  // well," well above any ml/kg formula. A baby gaining steadily on their
  // own curve is fine even if today's ml looks low against a population
  // guideline; the reverse (guideline-compliant ml but flat/falling weight)
  // is the more genuinely concerning pattern. Computed here so the model
  // treats it as the primary cross-check rather than an afterthought.
  const weightRecords = (growthRecords || [])
    .filter((g) => g.weightKg != null)
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  let weightTrendLine = "";
  if (weightRecords.length >= 2) {
    const latest = weightRecords[weightRecords.length - 1];
    const prior = weightRecords[weightRecords.length - 2];
    const daysBetween = Math.max(1, Math.round((new Date(latest.date) - new Date(prior.date)) / 86400000));
    const gainG = Math.round((latest.weightKg - prior.weightKg) * 1000);
    const gainPerWeek = Math.round((gainG / daysBetween) * 7);
    weightTrendLine =
      `SIGNAL B — weight trend (most important cross-check, weigh above the ml/kg guideline if they conflict): ` +
      `${prior.weightKg}kg on ${prior.date} to ${latest.weightKg}kg on ${latest.date} (${daysBetween} days apart), ` +
      `a change of ${gainG >= 0 ? "+" : ""}${gainG}g, roughly ${gainPerWeek >= 0 ? "+" : ""}${gainPerWeek}g/week. ` +
      `For general context only (not a rule to apply rigidly): many young infants gain very roughly in the ` +
      `neighborhood of 150-200g/week in the first few months, tapering as they get older — a baby tracking near ` +
      `or above their own recent trend is doing fine even if ml/kg looks lower than the population guideline; ` +
      `only treat a flat or declining weight trend alongside a real ml shortfall as worth a pediatrician mention.`;
  } else if (weightRecords.length === 1) {
    weightTrendLine = `Only one weight measurement logged (${weightRecords[0].weightKg}kg on ${weightRecords[0].date}) — not enough history yet to compute a weight trend; don't imply one.`;
  } else {
    weightTrendLine = "No weight measurements logged yet — skip any weight-trend cross-check entirely.";
  }

  // Pattern-level signals for habit-level coaching (not just today's total) —
  // again computed in code so the model narrates real findings instead of
  // inventing plausible-sounding but arbitrary advice.
  const last3Cutoff = new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000);
  const last3Entries = sorted.filter((e) => new Date(e.time) >= last3Cutoff);
  const last3Gaps = [];
  for (let i = 1; i < last3Entries.length; i++) last3Gaps.push((new Date(last3Entries[i].time) - new Date(last3Entries[i - 1].endTime || last3Entries[i - 1].time)) / 60000);
  const avgIntervalLast3 = last3Gaps.length ? Math.round(last3Gaps.reduce((a, b) => a + b, 0) / last3Gaps.length) : null;
  const intervalTrendDirection =
    avgIntervalLast3 != null && avgIntervalMins != null
      ? avgIntervalLast3 < avgIntervalMins - 10
        ? "shortening"
        : avgIntervalLast3 > avgIntervalMins + 10
        ? "lengthening"
        : "stable"
      : "unknown";

  const shortGapFeeds = [];
  for (let i = 1; i < last7.length; i++) {
    const gapMins = (new Date(last7[i].time) - new Date(last7[i - 1].endTime || last7[i - 1].time)) / 60000;
    if (gapMins < 90) {
      shortGapFeeds.push({ gapMins, volumeMl: last7[i].volumeMl || 0, bucketIdx: Math.floor(hourInTZ(last7[i].time) / 3) });
    }
  }
  const shortGapByBucket = {};
  shortGapFeeds.forEach((f) => { shortGapByBucket[f.bucketIdx] = (shortGapByBucket[f.bucketIdx] || 0) + 1; });
  let mostClusteredBucketIdx = null, mostClusteredCount = 0;
  Object.entries(shortGapByBucket).forEach(([idx, count]) => {
    if (count > mostClusteredCount) { mostClusteredCount = count; mostClusteredBucketIdx = parseInt(idx, 10); }
  });

  const daytimeBucketsForCapacity = bucketStats.filter((b) => b.hourStart >= 6 && b.hourStart < 21 && b.count >= 2);
  let capacityBucket = null;
  daytimeBucketsForCapacity.forEach((b) => {
    const headroom = b.max - b.avg;
    if (!capacityBucket || headroom > capacityBucket.max - capacityBucket.avg) capacityBucket = b;
  });

  const patternDirective = [
    `SIGNAL C — interval trend: last-3-day average interval is ${avgIntervalLast3 != null ? avgIntervalLast3 + "min" : "n/a"} vs the 7-day average of ${avgIntervalMins != null ? avgIntervalMins + "min" : "n/a"} (${intervalTrendDirection}). ` +
      `Day-only average interval (06:00-18:00): ${avgIntervalDayMins != null ? avgIntervalDayMins + "min" : "n/a"}. Night-only average interval (18:00-06:00): ${avgIntervalNightMins != null ? avgIntervalNightMins + "min" : "n/a"} — ` +
      `night gaps running longer than day gaps is normal circadian behavior, not a sign of anything; only the SAME-period comparison (night vs night, day vs day) is meaningful for judging whether a gap is unusually long right now.`,
    shortGapFeeds.length >= 3 && mostClusteredBucketIdx != null
      ? `SIGNAL D — cluster-feeding signal: ${shortGapFeeds.length} feeds in the last 7 days had gaps under 90 minutes, most often in the ${mostClusteredBucketIdx * 3}-${mostClusteredBucketIdx * 3 + 3}h window. IMPORTANT: cluster feeding like this is very commonly completely normal infant behavior — especially during growth spurts (classically around 3 weeks, 6 weeks, and 3 months) and in the evening hours — and is NOT inherently a problem to fix or something to "consolidate." Only mention it as noteworthy if you'd genuinely reassure a worried parent that it's likely normal; do not frame it as inefficient or suggest reducing/consolidating feeds.`
      : "SIGNAL D — no notable cluster-feeding signal (few or no sub-90-minute gaps) in the last 7 days.",
    capacityBucket
      ? `SIGNAL E — capacity signal: in the ${capacityBucket.hourStart}-${capacityBucket.hourStart + 3}h window, baby's average is ${capacityBucket.avg}ml but has taken as much as ${capacityBucket.max}ml before — demonstrated headroom of about ${capacityBucket.max - capacityBucket.avg}ml above that window's current average.`
      : "",
  ].filter(Boolean).join(" ");


  return [
    babyAgeSummary(now),
    weightKg ? `Baby's current weight: ${weightKg} kg (this is a manually-logged value that stays current until the parents update it again — treat it as accurate for today's context, not a fresh daily measurement).` : "",
    weightTrendLine,
    `Total feeds logged: ${sorted.length}.`,
    avgIntervalMins != null ? `Average interval between feeds (last 7 days): ${avgIntervalMins} minutes.` : "Not enough feeds yet for an interval average.",
    maxGapMins != null ? `Longest gap between feeds in the last 7 days: ${maxGapMins} minutes.` : "",
    avgVolume != null ? `Average volume per feed (last 7 days): ${avgVolume} ml.` : "",
    dayPct != null ? `Day (06:00-18:00) vs night (18:00-06:00) split (last 7 days): ${dayPct}% day, ${100 - dayPct}% night.` : "",
    avgDailyMl7 != null ? `Average total ml per day over the last 7 days: ${avgDailyMl7} ml.` : "",
    `Yesterday's total: ${yesterdayTotalMl} ml across ${yesterdayEntries.length} feeds.`,
    `Today's total so far: ${todayTotalMl} ml across ${todayEntries.length} feeds (note: today may still be in progress, so a lower total than average isn't necessarily a real drop — only flag it if it's still notably low by the end of the day).`,
    minsSinceLast != null ? `Minutes since the most recent feed: ${minsSinceLast}.` : "",
    `Last 3 days: ${last3DayTotals.join("; ")}.`,
    `Current time is ${fmtTime(now)} — roughly ${dayFractionElapsed}% of the day has elapsed.`,
    `Average volume by 3-hour window over the last 14 days: ${bucketSummary}.`,
    generalRangeLine,
    recommendationDirective,
    patternDirective,
  ].filter(Boolean).join(" ");
}

function buildSleepInsightSummary(sleepSessions, nowDate, weightKg) {
  const sorted = [...sleepSessions].sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
  const now = nowDate;
  const todayKeyNow = dayKey(now);
  function durationMins(s) {
    const end = s.endTime ? new Date(s.endTime) : now;
    return (end - new Date(s.startTime)) / 60000;
  }
  const completed = sorted.filter((s) => s.endTime);
  const ongoing = sorted.find((s) => !s.endTime);
  const last7Cutoff = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const last7 = completed.filter((s) => new Date(s.startTime) >= last7Cutoff);

  const avgNapsPerDay = last7.length ? Math.round((last7.length / 7) * 10) / 10 : null;
  const avgNapDurationMins = last7.length ? Math.round(last7.reduce((sum, s) => sum + durationMins(s), 0) / last7.length) : null;
  const longestStretchMins = last7.length ? Math.round(Math.max(...last7.map(durationMins))) : null;

  const wakeGaps = [];
  for (let i = 1; i < completed.length; i++) {
    if (new Date(completed[i].startTime) >= last7Cutoff) {
      wakeGaps.push((new Date(completed[i].startTime) - new Date(completed[i - 1].endTime)) / 60000);
    }
  }
  const avgWakeWindowMins = wakeGaps.length ? Math.round(wakeGaps.reduce((a, b) => a + b, 0) / wakeGaps.length) : null;

  let dayMins = 0, nightMins = 0;
  last7.forEach((s) => {
    const hh = hourInTZ(s.startTime);
    const mins = durationMins(s);
    if (hh >= 6 && hh < 18) dayMins += mins;
    else nightMins += mins;
  });
  const splitTotal = dayMins + nightMins;
  const dayPct = splitTotal ? Math.round((dayMins / splitTotal) * 100) : null;

  const todayAll = sorted.filter((s) => dayKey(new Date(s.startTime)) === todayKeyNow);
  const todayTotalMins = todayAll.reduce((sum, s) => sum + durationMins(s), 0);

  const yesterdayKey = shiftDayKey(todayKeyNow, -1);
  const yesterdayAll = sorted.filter((s) => dayKey(new Date(s.startTime)) === yesterdayKey);
  const yesterdayTotalMins = yesterdayAll.reduce((sum, s) => sum + durationMins(s), 0);

  const avgDailyMins7 = last7.length
    ? Math.round(
        Array.from({ length: 7 }, (_, i) => shiftDayKey(todayKeyNow, -i))
          .map((key) => sorted.filter((s) => dayKey(new Date(s.startTime)) === key).reduce((sum, s) => sum + durationMins(s), 0))
          .reduce((a, b) => a + b, 0) / 7
      )
    : null;

  return [
    babyAgeSummary(now),
    weightKg ? `Baby's current weight: ${weightKg} kg (a manually-logged value that stays current until updated).` : "",
    `Total sleep sessions logged: ${sorted.length}.`,
    ongoing ? `Baby is currently asleep, started at ${new Date(ongoing.startTime).toISOString()}.` : "Baby is currently awake.",
    avgNapsPerDay != null ? `Average number of sleep sessions per day (last 7 days): ${avgNapsPerDay}.` : "Not enough sleep data yet.",
    avgNapDurationMins != null ? `Average sleep session length (last 7 days): ${fmtDuration(avgNapDurationMins)}.` : "",
    longestStretchMins != null ? `Longest single sleep stretch in the last 7 days: ${fmtDuration(longestStretchMins)}.` : "",
    avgWakeWindowMins != null ? `Average awake time between sleep sessions (last 7 days): ${fmtDuration(avgWakeWindowMins)}.` : "",
    dayPct != null ? `Day (06:00-18:00) vs night (18:00-06:00) sleep split (last 7 days): ${dayPct}% day, ${100 - dayPct}% night.` : "",
    avgDailyMins7 != null ? `Average total sleep per day over the last 7 days: ${fmtDuration(avgDailyMins7)}.` : "",
    `Yesterday's total sleep: ${fmtDuration(yesterdayTotalMins) || "0m"} across ${yesterdayAll.length} sessions.`,
    `Today's total sleep so far: ${fmtDuration(todayTotalMins) || "0m"} across ${todayAll.length} sessions (today may still be in progress).`,
  ].filter(Boolean).join(" ");
}

function SimpleCountBarChart({ data, height, color = POOP_COLOR }) {
  const max = Math.max(1, ...data.map((d) => d.count));
  const barAreaH = height - 30;
  const [grown, setGrown] = useState(false);
  useEffect(() => {
    const raf1 = requestAnimationFrame(() => {
      requestAnimationFrame(() => setGrown(true));
    });
    return () => cancelAnimationFrame(raf1);
  }, []);
  return h(
    "div",
    { className: "flex items-start justify-between gap-1.5 px-2", style: { height } },
    data.map((d) =>
      h(
        "div",
        { key: d.label, className: "flex flex-col items-center flex-1" },
        h("span", { className: "text-[9px] font-mono mb-1 text-[var(--text-muted)]" }, d.count || "0"),
        h(
          "div",
          { className: "flex flex-col-reverse w-full", style: { height: barAreaH } },
          h("div", { className: "w-full rounded-sm", style: { height: grown ? Math.max(1, (d.count / max) * barAreaH) : 0, background: color, opacity: d.count ? 1 : 0.15, transition: "height 0.55s cubic-bezier(0.34, 1.2, 0.64, 1)" } })
        ),
        h("span", { className: "text-[8px] font-mono mt-1 text-[var(--text-muted)]" }, d.label)
      )
    )
  );
}

function SleepTab(props) {
  const {
    isAsleep, sleepStatusMins, showWakeWarning, ongoingSleep, lastCompletedSleep,

  } = props;

  const CONSISTENCIES = ["Seedy", "Soft", "Loose", "Watery", "Formed", "Hard"];
  const COLORS = ["Yellow", "Green", "Brown", "Tan", "Black", "Red"];
  const CAUSES = ["Routine check", "Noticed poop"];
  const isUnusualColor = (c) => c === "Black" || c === "Red";
  const includesPoop = (status) => status === "Dirty" || status === "Both";

  function ChipRow({ label, options, value, onChange }) {
    return h(
      "div",
      { className: "mb-3" },
      h("p", { className: "text-xs text-[var(--text-muted)] mb-2 font-mono uppercase tracking-wide" }, label),
      h(
        "div",
        { className: "flex flex-wrap gap-2" },

          h(
            "button",
            {
              key: opt,
              onClick: () => onChange(opt),
              className: "px-3 py-1.5 rounded-full text-sm font-mono border transition-colors " +
                (value === opt ? "bg-[var(--pill-bg)] text-[var(--pill-text)] border-[var(--pill-bg)]" : "bg-[var(--surface-2)] border-[var(--surface-2-border)] text-[var(--text-secondary)]"),
            },
            opt
          )
        )
      )
    );
  }

  function entryDetail(d) {
    const parts = [d.status || ""];
    if (includesPoop(d.status)) parts.push([d.consistency, d.color].filter(Boolean).join(" · "));
    if (d.cause) parts.push(d.cause);
    return parts.filter(Boolean).join(" · ");
  }

  return h(
    React.Fragment,
    null,

    /* Current status */
    h(
      "div",
      { className: "bg-[var(--card-bg)] border border-[var(--card-border)] rounded-2xl px-5 py-5 mb-6" },

      h("p", { className: "text-4xl neon-text", style: { fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600, color: "var(--text-primary)", "--glow-color-soft": "rgba(143,168,224,0.25)" } }, minutesSinceLastDiaper != null ? fmtDuration(minutesSinceLastDiaper) : "—"),

const SECTION_META = {

};

  const meta = SECTION_META[section];

  const statColor = urgency === "attention" ? "#E86A5C" : urgency === "active" ? meta.color : "var(--text-muted)";
  return h(
    "button",
    {
      onClick,
      className: "w-full flex items-center gap-3.5 bg-[var(--card-bg)] border rounded-2xl px-4 py-3.5 mb-2.5 text-left transition-transform active:scale-[0.99]",
      style: { borderColor: urgency === "attention" ? "rgba(232,106,92,0.5)" : "var(--card-border)" },
    },
    h(
      "span",
      {
        className: "flex-shrink-0 flex items-center justify-center rounded-xl" + (urgency !== "attention" ? " neon-glow" : ""),
        style: { width: 40, height: 40, background: `${meta.color}22`, color: meta.color, "--glow-color-soft": `${meta.color}40` },
      },
      h(Icon, { name: meta.icon, size: 22 })
    ),
    h(
      "div",
      { className: "flex-1 min-w-0" },
      h("p", { className: "text-sm font-medium text-[var(--text-primary)]" }, meta.label),
      h("p", { className: "text-xs mt-0.5 truncate", style: { color: statColor, fontWeight: urgency === "attention" ? 600 : 400 } }, stat)
    ),
    h("span", { className: "text-[var(--text-muted)] flex-shrink-0" }, h(Icon, { name: "chevron", size: 18 }))
  );
}

function Dashboard(props) {
  const {
    setActiveTab,
    minutesSinceLast, avgIntervalMins, lastEntry, quickLogFeed,
    isAsleep, sleepStatusMins,
    minutesSinceLastDiaper, isTummyInProgress, tummyStatusSecs, todayTummyTotalSecs,
    nextUpcomingVaccine, nextUpcomingIsOverdue, nextUpcomingDaysAway,
    weightKg, heightCm,
  } = props;

  // Feeding urgency, tiered to avoid alert fatigue:
  //  - modest overage (>15% past the usual gap): gentle amber "likely due soon"
  //  - very long gap (>3h past average): almost always means the app wasn't
  //    used, not a genuine 9-hour fast — so we phrase it as stale data to
  //    check, in calm text, rather than a perpetual red pseudo-medical alert.
  const overBy = minutesSinceLast != null && avgIntervalMins != null ? minutesSinceLast - avgIntervalMins : null;
  const feedModestlyOver = overBy != null && minutesSinceLast > avgIntervalMins * 1.15 && overBy <= 180;
  const feedLongGap = overBy != null && overBy > 180;
  const feedingStat = minutesSinceLast == null
    ? "No feeds logged yet"
    : feedLongGap
    ? `${fmtDuration(minutesSinceLast)} since last feed — up to date?`
    : `${fmtDuration(minutesSinceLast)} since last feed${feedModestlyOver ? " · likely due soon" : ""}`;
  const feedingUrgency = feedModestlyOver ? "attention" : "calm";

  const sleepStat = isAsleep
    ? `Asleep for ${fmtDuration(sleepStatusMins) || "0m"}`
    : sleepStatusMins != null ? `Awake for ${fmtDuration(sleepStatusMins)}` : "No sleep logged yet";
  const sleepUrgency = isAsleep ? "active" : "calm";

  const diaperStat = minutesSinceLastDiaper != null ? `${fmtDuration(minutesSinceLastDiaper)} since last change` : "No changes logged yet";

  const tummyStat = isTummyInProgress
    ? `In progress · ${fmtDurationSec(tummyStatusSecs)}`
    : todayTummyTotalSecs ? `${fmtDurationSec(todayTummyTotalSecs)} today` : "None yet today";
  const tummyUrgency = isTummyInProgress ? "active" : "calm";

  const vaccineStat = !nextUpcomingVaccine
    ? "All caught up"
    : nextUpcomingIsOverdue ? `Overdue · ${nextUpcomingVaccine.name}`
    : nextUpcomingDaysAway === 0 ? `Due today · ${nextUpcomingVaccine.name}`
    : `${nextUpcomingVaccine.name} in ${nextUpcomingDaysAway}d`;
  const vaccineUrgency = nextUpcomingIsOverdue ? "attention" : "calm";

  const growthStat = weightKg != null || heightCm != null
    ? [weightKg != null ? `${weightKg} kg` : null, heightCm != null ? `${heightCm} cm` : null].filter(Boolean).join(" · ")
    : "No measurements yet";

  const canQuickLog = !!lastEntry;
  const [quickType, setQuickType] = useState(lastEntry ? lastEntry.type : "breast");
  const [quickMinutesAgo, setQuickMinutesAgo] = useState(15);
  const [quickVolume, setQuickVolume] = useState(lastEntry && lastEntry.type !== "mixed" && lastEntry.volumeMl ? lastEntry.volumeMl : 120);
  const [quickMixedBreastMl, setQuickMixedBreastMl] = useState(lastEntry && lastEntry.type === "mixed" ? lastEntry.breastMl : 60);
  const [quickMixedFormulaMl, setQuickMixedFormulaMl] = useState(lastEntry && lastEntry.type === "mixed" ? lastEntry.formulaMl : 60);
  useEffect(() => {
    if (lastEntry) {
      setQuickType(lastEntry.type);
      if (lastEntry.type === "mixed") {
        setQuickMixedBreastMl(lastEntry.breastMl || 0);
        setQuickMixedFormulaMl(lastEntry.formulaMl || 0);
      } else {
        setQuickVolume(lastEntry.volumeMl || 120);
      }
    }
  }, [lastEntry && lastEntry.id]);

  return h(
    "div",
    { className: "mb-6" },

    // Quick log — seeded from the last feed but genuinely adjustable, since
    // feeds are rarely identical. Type toggle + a volume stepper, one tap
    // away from the exact number, instead of blindly repeating the last one.
    canQuickLog &&
      h(
        "div",
        {
          className: "rounded-2xl p-3 mb-5",
          style: {
            background: "linear-gradient(180deg, rgba(242,200,121,0.10) 0%, var(--card-bg) 60%)",
            border: "1px solid rgba(242,200,121,0.35)",
            boxShadow: "0 4px 16px rgba(242,200,121,0.06)",
          },
        },
        h(
          "p",
          { className: "text-[10px] uppercase tracking-wide mb-2 px-1 flex items-center gap-1.5", style: { color: "#C79A4A" } },
          h("span", { className: "inline-block w-1.5 h-1.5 rounded-full", style: { background: "#F2C879" } }),
          "Quick log"
        ),

function ValueLineChart({ data, height, color, unit }) {
  const w = 280;
  const marginX = 20;
  const padTop = 16;
  const padBottom = 20;
  const plotH = height - padTop - padBottom;
  const plotW = w - marginX * 2;
  const values = data.map((d) => d.value).filter((v) => v != null);
  if (!values.length) return h("p", { className: "text-xs text-[var(--text-muted)] text-center py-10" }, "Not enough data yet");
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = maxV - minV || 1;
  const stepX = data.length > 1 ? plotW / (data.length - 1) : 0;
  const points = data
    .map((d, i) => ({ ...d, x: marginX + i * stepX, y: d.value != null ? padTop + (1 - (d.value - minV) / range) * plotH : null }))
    .filter((p) => p.y != null);
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  return h(
    "div",
    { className: "w-full" },
    h(
      "svg",
      { viewBox: `0 0 ${w} ${height}`, width: "100%", height, preserveAspectRatio: "none", style: { overflow: "visible" } },
      h("path", { d: pathD, fill: "none", stroke: color, strokeWidth: 2 }),
      points.map((p, i) =>
        h(
          "g",
          { key: i },
          h("circle", { cx: p.x, cy: p.y, r: 3, fill: color }),
          h("text", { x: p.x, y: Math.max(9, p.y - 8), fontSize: 8, fill: "var(--text-secondary)", textAnchor: "middle", fontFamily: "monospace", fontWeight: "bold" }, `${p.value}`),
          h("text", { x: p.x, y: height - 4, fontSize: 7, fill: "var(--text-muted)", textAnchor: "middle", fontFamily: "monospace" }, p.label)
        )
      )
    )
  );
}

  const flushQueue = useCallback(async () => {
    let queue = loadQueue();
    if (!queue.length) return;
    while (queue.length) {
      const op = queue[0];
      try {
        if (op.type === "put") {
          const body = { time: op.entry.time, type: op.entry.type, volumeMl: op.entry.volumeMl };
          if (op.entry.breastMl != null) body.breastMl = op.entry.breastMl;
          if (op.entry.formulaMl != null) body.formulaMl = op.entry.formulaMl;
          await safeFetch(await authedUrl(`/entries/${op.entry.id}.json`), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
        } else if (op.type === "delete") {
          await safeFetch(await authedUrl(`/entries/${op.id}.json`), { method: "DELETE" });
        } else if (op.type === "weight") {
          await safeFetch(await authedUrl("/babyProfile.json"), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ weightKg: op.weightKg, weightUpdatedAt: op.updatedAt }),
          });
        } else if (op.type === "height") {
          await safeFetch(await authedUrl("/babyProfile.json"), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ heightCm: op.heightCm, heightUpdatedAt: op.updatedAt }),
          });
        } else if (op.type === "sleepPut") {
          await safeFetch(await authedUrl(`/sleepSessions/${op.session.id}.json`), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(
              op.session.endTime ? { startTime: op.session.startTime, endTime: op.session.endTime } : { startTime: op.session.startTime }
            ),
          });
        } else if (op.type === "sleepDelete") {
          await safeFetch(await authedUrl(`/sleepSessions/${op.id}.json`), { method: "DELETE" });
        } else if (op.type === "poopDelete") {
          // Only fires when a legacy poop-only entry is edited or deleted —
          // it's removed from the old collection as it migrates to diaperChanges.
          await safeFetch(await authedUrl(`/poopEntries/${op.id}.json`), { method: "DELETE" });
        } else if (op.type === "tummyPut") {
          await safeFetch(await authedUrl(`/tummyTimeSessions/${op.session.id}.json`), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(
              op.session.endTime ? { startTime: op.session.startTime, endTime: op.session.endTime } : { startTime: op.session.startTime }
            ),
          });
        } else if (op.type === "tummyDelete") {
          await safeFetch(await authedUrl(`/tummyTimeSessions/${op.id}.json`), { method: "DELETE" });
        } else if (op.type === "diaperPut") {
          const body = { time: op.entry.time, status: op.entry.status, cause: op.entry.cause };
          if (op.entry.consistency) body.consistency = op.entry.consistency;
          if (op.entry.color) body.color = op.entry.color;
          await safeFetch(await authedUrl(`/diaperChanges/${op.entry.id}.json`), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
        } else if (op.type === "diaperDelete") {
          await safeFetch(await authedUrl(`/diaperChanges/${op.id}.json`), { method: "DELETE" });
        } else if (op.type === "vaccinePut") {
          await safeFetch(await authedUrl(`/vaccineRecords/${op.entry.id}.json`), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(op.entry.data),
          });
        } else if (op.type === "vaccineDelete") {
          await safeFetch(await authedUrl(`/vaccineRecords/${op.id}.json`), { method: "DELETE" });
        } else if (op.type === "growthPut") {
          await safeFetch(await authedUrl(`/growthRecords/${op.dateKey}.json`), {

            headers: { "Content-Type": "application/json" },

        } else if (op.type === "growthDelete") {
          await safeFetch(await authedUrl(`/growthRecords/${op.id}.json`), { method: "DELETE" });
        }
        queue = queue.slice(1);
        saveQueue(queue);
        setPendingCount(queue.length);
        setIsOnline(true);
      } catch (e) {
        if (e.isNetworkError) {
          setIsOnline(false);
          break; // genuinely offline — stop and retry everything remaining next time
        } else {
          // request reached the server but was rejected (e.g. rules/validation) —

  async function sendChatMessage(rawText) {
    const text = (rawText || "").trim();
    if (!text || chatSubmitting) return;
    if (!groqApiKeyRef.current) {
      setChatError("Add a Groq key first (see the AI insight panel on the Feeding or Sleep tab) to enable chat.");
      return;
    }
    const userMsg = { role: "user", content: text };
    const nextMessages = [...chatMessages, userMsg];
    setChatMessages(nextMessages);
    setChatSubmitting(true);
    setChatError(null);
    try {
      // Reuses the exact same summary machinery as the Feeding insight — one
      // source of truth for "what does this baby's real data say," rather
      // than a second, parallel computation that could quietly drift out of
      // sync with it over time.
      const dataContext = entriesRef.current.length >= 3
        ? buildInsightSummary(entriesRef.current, new Date(), weightRef.current, growthRecordsRef.current)
        : "";
      const systemPrompt = buildChatSystemPrompt(new Date(), weightRef.current, heightCmRef.current, dataContext);
      const apiMessages = [{ role: "system", content: systemPrompt }, ...nextMessages];
      const reply = await generateChatReply(apiMessages, groqApiKeyRef.current);
      setChatMessages([...nextMessages, { role: "assistant", content: reply }]);
    } catch (e) {
      setChatError(`Couldn't get a reply: ${e.message}`);
    }
    setChatSubmitting(false);
  }

  async function recordGrowthPoint(field, value) {
    const dateKey = dayKey(new Date());
    const existing = growthRecords.find((g) => g.id === dateKey);
    const updated = { id: dateKey, ...(existing || { date: dateKey }), [field]: value };
    const next = existing ? growthRecords.map((g) => (g.id === dateKey ? updated : g)) : [...growthRecords, updated];
    setGrowthRecords(next.sort((a, b) => new Date(a.date) - new Date(b.date)));
    try {
      await safeFetch(await authedUrl(`/growthRecords/${dateKey}.json`), {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ date: dateKey, [field]: value }),
      });
    } catch (e) {
      if (e.isNetworkError) {
        const queue = loadQueue();
        queue.push({ type: "growthPut", dateKey, data: { date: dateKey, [field]: value } });
        saveQueue(queue);
        setPendingCount(queue.length);
      }
    }
  }

  async function saveEditDiaper() {
    const time = tzWallTimeToISO(editDiaperDateKey, editDiaperHour, editDiaperMinute);
    const includesPoop = editDiaperStatus === "Dirty" || editDiaperStatus === "Both";
    const updated = { id: editingDiaperId, time, status: editDiaperStatus, cause: editDiaperCause };
    if (includesPoop) {
      updated.consistency = editDiaperConsistency;
      updated.color = editDiaperColor;
    }
    const wasLegacy = editingDiaperIsLegacy;
    if (wasLegacy) {
      setPoopEntriesLegacy((prev) => prev.filter((p) => p.id !== editingDiaperId));
      setDiaperChanges((prev) => [...prev, updated].sort((a, b) => new Date(a.time) - new Date(b.time)));
    } else {
      setDiaperChanges((prev) => prev.map((d) => (d.id === editingDiaperId ? updated : d)).sort((a, b) => new Date(a.time) - new Date(b.time)));
    }
    setEditingDiaperId(null);
    const payload = { time: updated.time, status: updated.status, cause: updated.cause };
    if (updated.consistency) payload.consistency = updated.consistency;
    if (updated.color) payload.color = updated.color;
    try {
      if (wasLegacy) {
        await safeFetch(await authedUrl(`/poopEntries/${updated.id}.json`), { method: "DELETE" });
      }
      await safeFetch(await authedUrl(`/diaperChanges/${updated.id}.json`), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      setIsOnline(true);
    } catch (e) {
      if (e.isNetworkError) {
        const queue = loadQueue();
        if (wasLegacy) queue.push({ type: "poopDelete", id: updated.id });
        queue.push({ type: "diaperPut", entry: updated });
        saveQueue(queue);
        setPendingCount(queue.length);
        setIsOnline(false);
        setError("Edit saved on this phone — will sync once you're back online.");
      } else {
        setIsOnline(true);
        setError(`Couldn't save: ${e.message}`);
      }
    }
  }

  // Growth records are the authoritative history, but weightKg/heightCm are
  // separate "current value" state used everywhere else (header, dashboard,
  // ml/kg calc, AI insight). Adding/editing/deleting a growth record never
  // touched those on its own — this keeps them in sync with whatever the
  // true latest record now says, after any change to the history.
  async function syncCurrentFromGrowth(records) {
    const valid = records.filter((g) => g.date && !isNaN(new Date(g.date).getTime()));
    const withWeight = valid.filter((g) => g.weightKg != null).sort((a, b) => new Date(b.date) - new Date(a.date));
    const withHeight = valid.filter((g) => g.heightCm != null).sort((a, b) => new Date(b.date) - new Date(a.date));
    const latestWeight = withWeight[0] || null;
    const latestHeight = withHeight[0] || null;

    if (latestWeight && latestWeight.weightKg !== weightKg) {
      const updatedAt = new Date().toISOString();
      setWeightKg(latestWeight.weightKg);
      setWeightUpdatedAt(updatedAt);
      try { localStorage.setItem("nightwatch_weight_cache", JSON.stringify({ weightKg: latestWeight.weightKg, updatedAt })); } catch (e) {}
      try {
        await safeFetch(await authedUrl("/babyProfile.json"), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ weightKg: latestWeight.weightKg, weightUpdatedAt: updatedAt }),
        });
        setIsOnline(true);
      } catch (e) {
        if (e.isNetworkError) {
          const queue = loadQueue();
          queue.push({ type: "weight", weightKg: latestWeight.weightKg, updatedAt });
          saveQueue(queue);
          setPendingCount(queue.length);
          setIsOnline(false);
        } else {
          setIsOnline(true);
        }
      }
    } else if (!latestWeight && weightKg != null) {
      // No weight records remain at all (e.g. the last one was deleted) —
      // clear the current value rather than keep showing stale data.
      setWeightKg(null);
      setWeightUpdatedAt(null);
      try { localStorage.removeItem("nightwatch_weight_cache"); } catch (e) {}
      try {
        await safeFetch(await authedUrl("/babyProfile.json"), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ weightKg: null, weightUpdatedAt: null }),
        });
      } catch (e) {}
    }

    if (latestHeight && latestHeight.heightCm !== heightCm) {
      const updatedAt = new Date().toISOString();
      setHeightCm(latestHeight.heightCm);
      setHeightUpdatedAt(updatedAt);
      try {
        await safeFetch(await authedUrl("/babyProfile.json"), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ heightCm: latestHeight.heightCm, heightUpdatedAt: updatedAt }),
        });
        setIsOnline(true);
      } catch (e) {
        if (e.isNetworkError) {
          const queue = loadQueue();
          queue.push({ type: "height", heightCm: latestHeight.heightCm, updatedAt });
          saveQueue(queue);
          setPendingCount(queue.length);
          setIsOnline(false);
        } else {
          setIsOnline(true);
        }
      }
    } else if (!latestHeight && heightCm != null) {
      setHeightCm(null);
      setHeightUpdatedAt(null);
      try {
        await safeFetch(await authedUrl("/babyProfile.json"), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ heightCm: null, heightUpdatedAt: null }),
        });
      } catch (e) {}
    }
  }

  async function saveEditGrowth() {
    const w = parseFloat(editGrowthWeight);
    const hgt = parseFloat(editGrowthHeight);
    const data = { date: editGrowthDate };
    if (w > 0) data.weightKg = Math.round(w * 100) / 100;
    if (hgt > 0) data.heightCm = Math.round(hgt * 10) / 10;
    const updated = { id: editingGrowthId, ...data };
    const idChanged = editingGrowthId !== editGrowthDate;
    let next = growthRecords.map((g) => (g.id === editingGrowthId ? updated : g));
    if (idChanged) next = next.filter((g) => g.id !== editingGrowthId).concat(updated);
    setGrowthRecords(next.sort((a, b) => new Date(a.date) - new Date(b.date)));
    await syncCurrentFromGrowth(next);
    setEditingGrowthId(null);
    try {
      if (idChanged) {
        await safeFetch(await authedUrl(`/growthRecords/${editingGrowthId}.json`), { method: "DELETE" });
      }
      await safeFetch(await authedUrl(`/growthRecords/${editGrowthDate}.json`), {

        setPendingCount(queue.length);
        setIsOnline(false);

      } else {
        setIsOnline(true);
        setError(`Couldn't save: ${e.message}`);
      }
    }
  }

  const sorted = [...entries].sort((a, b) => new Date(a.time) - new Date(b.time));
  const todayKeyNow = dayKey(now);
  const todayEntries = sorted.filter((e) => dayKey(new Date(e.time)) === todayKeyNow);
  const lastEntry = sorted[sorted.length - 1];
  const minutesSinceLast = lastEntry ? (now - new Date(lastEntry.endTime || lastEntry.time)) / 60000 : null;

  const last7Cutoff = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const last14Cutoff = new Date(now.getTime() - 14 * 24 * 60 * 60 * 1000);
  const last7Entries = sorted.filter((e) => new Date(e.time) >= last7Cutoff);
  const last14Entries = sorted.filter((e) => new Date(e.time) >= last14Cutoff);

  const avgVolume7 = last7Entries.length ? Math.round(last7Entries.reduce((s, e) => s + e.volumeMl, 0) / last7Entries.length) : null;
  const intervalGaps7 = [];
  const intervalGapsDay7 = [];
  const intervalGapsNight7 = [];
  for (let i = 1; i < last7Entries.length; i++) {
    const gap = (new Date(last7Entries[i].time) - new Date(last7Entries[i - 1].endTime || last7Entries[i - 1].time)) / 60000;
    intervalGaps7.push(gap);
    // Classify by the hour of the feed that ENDED the gap — i.e. "how long
    // was the wait leading up to a night feed" vs "leading up to a day feed."
    const endHour = hourInTZ(last7Entries[i].time);
    if (endHour >= 18 || endHour < 6) intervalGapsNight7.push(gap);
    else intervalGapsDay7.push(gap);
  }
  const avgIntervalMins7 = intervalGaps7.length ? intervalGaps7.reduce((a, b) => a + b, 0) / intervalGaps7.length : null;
  const avgIntervalDayMins7 = intervalGapsDay7.length ? intervalGapsDay7.reduce((a, b) => a + b, 0) / intervalGapsDay7.length : null;
  const avgIntervalNightMins7 = intervalGapsNight7.length ? intervalGapsNight7.reduce((a, b) => a + b, 0) / intervalGapsNight7.length : null;

  // Night gaps run longer in practice (fewer dream-feeds, longer sleep
  // stretches), so a single flat average would falsely read as "off pace"
  // during a normal overnight stretch. Use whichever period's average
  // matches right now for anything time-sensitive (urgency badges, the
  // next-feed prediction); the flat avgIntervalMins7 stays as the honest
  // overall figure for the "Feeding patterns" stat further down.
  const currentHourForInterval = hourInTZ(now);
  const isNightNow = currentHourForInterval >= 18 || currentHourForInterval < 6;
  const contextualAvgInterval = isNightNow
    ? (avgIntervalNightMins7 != null ? avgIntervalNightMins7 : avgIntervalMins7)
    : (avgIntervalDayMins7 != null ? avgIntervalDayMins7 : avgIntervalMins7);

  // Chat quick-questions: dynamic when the data actually has something
  // notable going on (Option D), never surfacing a question the data can't
  // yet support (Option E) — e.g. no weight-gain question with under 2
  // weigh-ins logged, since that would just produce a hedge, not an answer.
  let shortGapCount7 = 0;
  for (let i = 1; i < last7Entries.length; i++) {
    const gap = (new Date(last7Entries[i].time) - new Date(last7Entries[i - 1].endTime || last7Entries[i - 1].time)) / 60000;
    if (gap < 90) shortGapCount7++;
  }
  const hasClusterSignal = shortGapCount7 >= 3;
  const hasWeightTrend = growthRecords.filter((g) => g.weightKg != null).length >= 2;
  const hasFeedingData = last7Entries.length >= 3;
  const dynamicQuickQuestions = [];
  if (hasClusterSignal) dynamicQuickQuestions.push("Why are feeds clustering some days?");
  if (hasWeightTrend) dynamicQuickQuestions.push("Is the weight gain on track?");
  const genericQuickQuestions = [];
  if (hasFeedingData) genericQuickQuestions.push("Is feeding on track this week?");
  genericQuickQuestions.push("What should I expect at this age?");
  genericQuickQuestions.push("Anything unusual lately?");
  const quickQuestions = [...dynamicQuickQuestions, ...genericQuickQuestions].slice(0, 4);

  let feedColor = "var(--text-primary)";
  let feedBadge = null;
  if (contextualAvgInterval != null && minutesSinceLast != null) {
    // Enough history for a context-aware threshold: relative to the
    // day/night-appropriate average rather than a flat number of minutes.
    const overBy = minutesSinceLast - contextualAvgInterval;
    if (minutesSinceLast > contextualAvgInterval * 1.15 && overBy <= 180) {
      feedColor = "#F2A65A";
      feedBadge = "likely due soon";
    } else if (overBy > 180) {
      feedColor = "var(--text-muted)";
      feedBadge = "up to date?";
    }
  } else if (minutesSinceLast != null && minutesSinceLast >= 150 && minutesSinceLast < 300) {
    // Not enough history yet for a meaningful average — fall back to a
    // reasonable flat default until a week or so of data builds up.
    feedColor = "#F2A65A";
    feedBadge = "likely due soon";
  } else if (minutesSinceLast != null && minutesSinceLast >= 300) {
    feedColor = "var(--text-muted)";
    feedBadge = "up to date?";
  }
  const showFeedWarning = feedBadge != null;

  const todayTotalMl = todayEntries.reduce((s, e) => s + (e.volumeMl || 0), 0);
  const todayBreastMl = todayEntries.reduce((s, e) => s + entryBreastMl(e), 0);
  const todayFormulaMl = todayEntries.reduce((s, e) => s + entryFormulaMl(e), 0);

  const trendDayKeys = [];
  for (let i = 6; i >= 0; i--) trendDayKeys.push(shiftDayKey(todayKeyNow, -i));
  const trendData = trendDayKeys.map((key) => {
    const dayEntries = sorted.filter((e) => dayKey(new Date(e.time)) === key);
    return {
      label: new Date(keyToUTCms(key)).toLocaleDateString([], { weekday: "short", timeZone: "UTC" }),
      fullLabel: fmtDayLabel(key),
      breast: dayEntries.reduce((s, e) => s + entryBreastMl(e), 0),
      formula: dayEntries.reduce((s, e) => s + entryFormulaMl(e), 0),
    };
  });

  // Ties Feeding to Growth: a clinically-meaningful "ml per kg per day" figure,
  // using the 7-day rolling average (stable) rather than today's still-partial
  // total. Only shown once both a weight and enough feeding history exist.
  const avgDailyMl7 = last7Entries.length ? Math.round(last7Entries.reduce((s, e) => s + (e.volumeMl || 0), 0) / 7) : null;
  const mlPerKgPerDay = weightKg && avgDailyMl7 != null ? Math.round((avgDailyMl7 / weightKg) * 10) / 10 : null;

  // Predictive next-feed estimate: last feed's end + the typical interval for
  // this time of day. Forward-looking rather than only ever describing what
  // already happened. Only shown when there's a real average to anchor it
  // to, and suppressed once we're already well past it (that's what the
  // "likely due soon" / "up to date?" badges above are for instead).
  const nextFeedEstimate = lastEntry && contextualAvgInterval != null && (minutesSinceLast == null || minutesSinceLast < contextualAvgInterval)
    ? new Date(new Date(lastEntry.endTime || lastEntry.time).getTime() + contextualAvgInterval * 60000)
    : null;

  // Shareable weekly summary — plain language, meant to screenshot or paste
  // into a message ahead of a pediatrician visit. Deterministic (no AI call),
  // so it's always available instantly and never varies between refreshes.
  const totalBreast7 = trendData.reduce((s, d) => s + d.breast, 0);
  const totalFormula7 = trendData.reduce((s, d) => s + d.formula, 0);
  const total7ForSummary = totalBreast7 + totalFormula7;
  const breastPct7 = total7ForSummary ? Math.round((totalBreast7 / total7ForSummary) * 100) : null;
  const dailyTotals7 = trendData.map((d) => d.breast + d.formula);
  const avgTotal7ForSummary = dailyTotals7.length ? dailyTotals7.reduce((a, b) => a + b, 0) / dailyTotals7.length : 0;
  const standoutDays = trendData.filter((d, i) => avgTotal7ForSummary > 0 && Math.abs(dailyTotals7[i] - avgTotal7ForSummary) / avgTotal7ForSummary > 0.25);
  const feedingSummaryText = [
    `Feeding summary — last 7 days`,
    `${babyAgeShort(now)}${weightKg ? `, ${weightKg} kg` : ""}${heightCm ? `, ${heightCm} cm` : ""}.`,
    avgDailyMl7 != null ? `Average intake: ${avgDailyMl7} ml/day${mlPerKgPerDay != null ? ` (≈${mlPerKgPerDay} ml/kg/day)` : ""}.` : "Not enough feeding data yet for a daily average.",
    avgIntervalMins7 != null ? `Average time between feeds: ${fmtDuration(Math.round(avgIntervalMins7))}.` : "",
    breastPct7 != null ? `Breast milk: ${breastPct7}% · Formula: ${100 - breastPct7}%.` : "",
    standoutDays.length
      ? `Days that stood out: ${standoutDays.map((d) => `${d.fullLabel} (${d.breast + d.formula} ml)`).join(", ")}.`
      : `Feeding has been fairly consistent day to day this week.`,
  ].filter(Boolean).join("\n");

  let dayMl = 0, nightMl = 0;
  last7Entries.forEach((e) => {
    const hh = hourInTZ(e.time);
    if (hh >= 6 && hh < 18) dayMl += e.volumeMl;
    else nightMl += e.volumeMl;
  });
  const splitTotalMl = dayMl + nightMl;
  const dayPct = splitTotalMl ? Math.round((dayMl / splitTotalMl) * 100) : 0;
  const nightPct = splitTotalMl ? 100 - dayPct : 0;

  const volumeBuckets = Array.from({ length: 8 }, (_, i) => ({ hourStart: i * 3, totalMl: 0, count: 0, volumeCount: 0 }));
  last14Entries.forEach((e) => {
    const hh = hourInTZ(e.time);
    const idx = Math.floor(hh / 3);
    volumeBuckets[idx].count += 1;
    if (e.volumeMl != null) {
      volumeBuckets[idx].totalMl += e.volumeMl;
      volumeBuckets[idx].volumeCount += 1;
    }
  });
  const totalLast14 = last14Entries.length;
  const avgVolumeByTimeData = volumeBuckets.map((b) => ({
    label: `${b.hourStart}-${b.hourStart + 3}`,
    value: b.volumeCount ? Math.round(b.totalMl / b.volumeCount) : 0,
    count: b.count,
    pct: totalLast14 ? Math.round((b.count / totalLast14) * 100) : 0,
  }));
  const currentBucketIndex = Math.floor(hourInTZ(now) / 3);

  const historyByDay = {};
  sorted.forEach((e, idx) => {
    const key = dayKey(new Date(e.time));
    if (!historyByDay[key]) historyByDay[key] = [];
    const prev = sorted[idx - 1];
    const gapMins = prev ? (new Date(e.time) - new Date(prev.time)) / 60000 : null;
    historyByDay[key].push({ ...e, gapMins });
  });
  const historyKeys = Object.keys(historyByDay).sort((a, b) => (a < b ? 1 : -1));

  /* ---------- SLEEP ANALYTICS ---------- */
  const sortedSleep = [...sleepSessions].sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
  const ongoingSleep = sortedSleep.find((s) => !s.endTime);
  const completedSleep = sortedSleep.filter((s) => s.endTime);
  const lastCompletedSleep = completedSleep[completedSleep.length - 1];
  function sleepDurationMins(s) {
    const end = s.endTime ? new Date(s.endTime) : now;
    return (end - new Date(s.startTime)) / 60000;
  }
  const isAsleep = !!ongoingSleep;
  const sleepStatusMins = isAsleep
    ? sleepDurationMins(ongoingSleep)
    : lastCompletedSleep
    ? (now - new Date(lastCompletedSleep.endTime)) / 60000
    : null;
  let sleepStatusColor = "var(--text-primary)";
  let showWakeWarning = false;
  if (!isAsleep && sleepStatusMins != null && sleepStatusMins >= 90) {
    showWakeWarning = true;
    sleepStatusColor = sleepStatusMins >= 120 ? "#E86A5C" : "#F2A65A";
  }

  const todaySleepAll = sortedSleep.filter((s) => dayKey(new Date(s.startTime)) === todayKeyNow);
  const todaySleepTotalMins = todaySleepAll.reduce((sum, s) => sum + sleepDurationMins(s), 0);
  const todayNapCount = todaySleepAll.length;
  const todayLongestStretchMins = todaySleepAll.length ? Math.max(...todaySleepAll.map(sleepDurationMins)) : 0;

  const sleepTrendData = trendDayKeys.map((key) => {
    const daySessions = completedSleep.filter((s) => dayKey(new Date(s.startTime)) === key);
    const dayMins = daySessions.filter((s) => { const hh = hourInTZ(s.startTime); return hh >= 6 && hh < 18; }).reduce((sum, s) => sum + sleepDurationMins(s), 0);
    const nightMins = daySessions.filter((s) => { const hh = hourInTZ(s.startTime); return !(hh >= 6 && hh < 18); }).reduce((sum, s) => sum + sleepDurationMins(s), 0);
    return {
      label: new Date(keyToUTCms(key)).toLocaleDateString([], { weekday: "short", timeZone: "UTC" }),
      fullLabel: fmtDayLabel(key),
      naps: Math.round((dayMins / 60) * 10) / 10,
      night: Math.round((nightMins / 60) * 10) / 10,
    };
  });

  const last7Sleep = completedSleep.filter((s) => new Date(s.startTime) >= last7Cutoff);
  const avgNapsPerDay7 = last7Sleep.length ? Math.round((last7Sleep.length / 7) * 10) / 10 : null;
  const avgNapDurationMins7 = last7Sleep.length ? Math.round(last7Sleep.reduce((sum, s) => sum + sleepDurationMins(s), 0) / last7Sleep.length) : null;
  const longestStretchMins7 = last7Sleep.length ? Math.max(...last7Sleep.map(sleepDurationMins)) : null;

  const wakeGaps7 = [];
  for (let i = 1; i < completedSleep.length; i++) {
    const prev = completedSleep[i - 1];
    const curr = completedSleep[i];
    if (new Date(curr.startTime) >= last7Cutoff) {
      wakeGaps7.push((new Date(curr.startTime) - new Date(prev.endTime)) / 60000);
    }
  }
  const avgWakeWindowMins7 = wakeGaps7.length ? Math.round(wakeGaps7.reduce((a, b) => a + b, 0) / wakeGaps7.length) : null;

  let sleepDayMins = 0, sleepNightMins = 0;
  last7Sleep.forEach((s) => {
    const hh = hourInTZ(s.startTime);
    const mins = sleepDurationMins(s);
    if (hh >= 6 && hh < 18) sleepDayMins += mins;
    else sleepNightMins += mins;
  });
  const sleepSplitTotal = sleepDayMins + sleepNightMins;
  const sleepDayPct = sleepSplitTotal ? Math.round((sleepDayMins / sleepSplitTotal) * 100) : 0;

  const last14Sleep = completedSleep.filter((s) => new Date(s.startTime) >= last14Cutoff);
  const sleepBuckets = Array.from({ length: 8 }, (_, i) => ({ hourStart: i * 3, totalMins: 0, count: 0 }));
  last14Sleep.forEach((s) => {
    const idx = Math.floor(hourInTZ(s.startTime) / 3);
    sleepBuckets[idx].totalMins += sleepDurationMins(s);
    sleepBuckets[idx].count += 1;
  });
  const totalLast14Sleep = last14Sleep.length;
  const sleepBucketData = sleepBuckets.map((b) => ({
    label: `${b.hourStart}-${b.hourStart + 3}`,
    value: b.count ? Math.round(b.totalMins / b.count) : 0,

  const sleepHistoryByDay = {};
  sortedSleep.forEach((s) => {

  const sleepHistoryKeys = Object.keys(sleepHistoryByDay).sort((a, b) => (a < b ? 1 : -1));

  /* ---------- DIAPER CHANGE ANALYTICS (unified: one event, status + cause) ----------

  const sortedDiaper = [
    ...diaperChanges,

  const lastDiaper = sortedDiaper[sortedDiaper.length - 1];
  const minutesSinceLastDiaper = lastDiaper ? (now - new Date(lastDiaper.time)) / 60000 : null;
  const todayDiaperEntries = sortedDiaper.filter((d) => dayKey(new Date(d.time)) === todayKeyNow);
  const todayDiaperCount = todayDiaperEntries.length;
  const todayPoopCount = todayDiaperEntries.filter((d) => d.status === "Dirty" || d.status === "Both").length;

  const last7DiaperEntries = sortedDiaper.filter((d) => new Date(d.time) >= last7Cutoff);
  const last7PoopEntries = last7DiaperEntries.filter((d) => d.status === "Dirty" || d.status === "Both");
  const avgPoopsPerDay7 = last7DiaperEntries.length ? Math.round((last7PoopEntries.length / 7) * 10) / 10 : null;

  const diaperTrendData = trendDayKeys.map((key) => ({
    label: new Date(keyToUTCms(key)).toLocaleDateString([], { weekday: "short", timeZone: "UTC" }),
    fullLabel: fmtDayLabel(key),
    count: sortedDiaper.filter((d) => dayKey(new Date(d.time)) === key).length,
    poopCount: sortedDiaper.filter((d) => dayKey(new Date(d.time)) === key && (d.status === "Dirty" || d.status === "Both")).length,
  }));

  const last14Diaper = sortedDiaper.filter((d) => new Date(d.time) >= last14Cutoff);
  const diaperBuckets = Array.from({ length: 8 }, (_, i) => ({ hourStart: i * 3, count: 0 }));
  last14Diaper.forEach((d) => {

  });
  const totalLast14Diaper = last14Diaper.length;

  const diaperHistoryByDay = {};

  });
  const diaperHistoryKeys = Object.keys(diaperHistoryByDay).sort((a, b) => (a < b ? 1 : -1));

  /* ---------- TUMMY TIME ANALYTICS ---------- */
  const sortedTummy = [...tummySessions].sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
  const ongoingTummy = sortedTummy.find((s) => !s.endTime);
  const completedTummy = sortedTummy.filter((s) => s.endTime);
  const lastCompletedTummy = completedTummy[completedTummy.length - 1];
  function tummyDurationSecs(s) {
    const end = s.endTime ? new Date(s.endTime) : tummyNow;
    return (end - new Date(s.startTime)) / 1000;
  }
  const isTummyInProgress = !!ongoingTummy;
  const tummyStatusSecs = isTummyInProgress ? tummyDurationSecs(ongoingTummy) : null;
  const minutesSinceLastTummy = !isTummyInProgress && lastCompletedTummy ? (now - new Date(lastCompletedTummy.endTime)) / 60000 : null;

  const todayTummyAll = sortedTummy.filter((s) => dayKey(new Date(s.startTime)) === todayKeyNow);
  const todayTummyTotalSecs = todayTummyAll.reduce((sum, s) => sum + tummyDurationSecs(s), 0);
  const todayTummyCount = todayTummyAll.length;

  const tummyTrendData = trendDayKeys.map((key) => {
    const daySessions = completedTummy.filter((s) => dayKey(new Date(s.startTime)) === key);
    return {
      label: new Date(keyToUTCms(key)).toLocaleDateString([], { weekday: "short", timeZone: "UTC" }),
      fullLabel: fmtDayLabel(key),

  const last7Tummy = completedTummy.filter((s) => new Date(s.startTime) >= last7Cutoff);
  const avgTummySessionsPerDay7 = last7Tummy.length ? Math.round((last7Tummy.length / 7) * 10) / 10 : null;
  const avgTummyMinsPerDay7 = last7Tummy.length

  const last14Tummy = completedTummy.filter((s) => new Date(s.startTime) >= last14Cutoff);
  const tummyBuckets = Array.from({ length: 8 }, (_, i) => ({ hourStart: i * 3, count: 0 }));

  const tummyHistoryKeys = Object.keys(tummyHistoryByDay).sort((a, b) => (a < b ? 1 : -1));

      : "";

  /* ---------- VACCINE ANALYTICS ---------- */
  const givenVaccines = vaccineRecords.filter((v) => v.status === "given").sort((a, b) => new Date(b.date) - new Date(a.date));

  const upcomingVaccines = [...standaloneScheduled, ...derivedFromNextDue].sort((a, b) => new Date(a.date) - new Date(b.date));
  const todayKeyForVaccine = dayKey(now);
  const nextUpcomingVaccine = upcomingVaccines.length ? upcomingVaccines[0] : null;
  const nextUpcomingIsOverdue = nextUpcomingVaccine ? nextUpcomingVaccine.date < todayKeyForVaccine : false;
  const nextUpcomingDaysAway = nextUpcomingVaccine
    ? Math.round((keyToUTCms(nextUpcomingVaccine.date) - keyToUTCms(todayKeyForVaccine)) / 86400000)
    : null;

  async function copyFeedingSummary() {
    try {
      await navigator.clipboard.writeText(feedingSummaryText);
      setSummaryCopied(true);
      setTimeout(() => setSummaryCopied(false), 2000);
    } catch (e) {
      setError("Couldn't copy — you can select and copy the text manually instead.");
    }
  }

  function handleExport() {
    const data = JSON.stringify(sorted, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `nightwatch-backup-${dayKey(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  if (!loaded) {
    return h("div", { className: "min-h-screen bg-[var(--bg)] flex items-center justify-center" },
      h("div", { className: "text-[var(--text-tertiary)] font-mono text-sm tracking-wide" }, "loading nightwatch…"));
  }

  return h(
    "div",
    { className: "min-h-screen bg-[var(--bg)] text-[var(--text-primary)]" },
    h(
      "div",
      { className: "max-w-md mx-auto px-4 pb-24" },

      /* Header */
      h(
        "div",
        { className: "pt-8 pb-4 flex items-start justify-between" },
        h(
          "div",
          null,
          h("h1", { className: "text-3xl leading-none", style: { fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600 } }, "Bảo Trân's diary"),
          h("p", { className: "text-[var(--text-tertiary)] text-sm mt-1 font-mono" }, now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric", timeZone: APP_TIMEZONE })),
          h("p", { className: "text-[9px] text-[var(--text-muted)] mt-0.5 font-mono" }, `build ${APP_VERSION}`),
          (!isOnline || pendingCount > 0) &&
            h(

              h("span", { className: "w-1.5 h-1.5 rounded-full inline-block", style: { background: "#F2A65A" } }),

            )
        ),
        h(

          { className: "flex gap-2" },
          h(IconBtn, { onClick: handleExport, className: "mt-1 p-2.5", label: "Export backup" }, h(Icon, { name: "download", size: 16 })),
          h(IconBtn, { onClick: () => loadEntries(true), className: "mt-1 p-2.5", label: "Sync now" },
            h(Icon, { name: "refresh", size: 15, className: syncing ? "animate-spin" : "" }))
        )
      ),

      /* Baby age, weight & height — shared across tabs */
      h(
        "div",
        { className: "flex items-center justify-between mb-4 px-1 gap-2" },
        h("span", { className: "text-xs font-mono text-[var(--text-muted)] flex-shrink-0" }, babyAgeShort(now)),
        h(
          "div",
          { className: "flex items-center gap-2" },
          editingWeight
            ? h(
                "div",
                { className: "flex items-center gap-1" },
                h("input", {
                  autoFocus: true,
                  value: weightDraft,
                  onChange: (e) => setWeightDraft(e.target.value),
                  onKeyDown: (e) => e.key === "Enter" && saveWeight(),

                  className: "w-14 bg-[var(--surface-2)] border border-[var(--surface-2-border)] rounded-full px-2 py-0.5 text-xs outline-none focus:border-[#8FA8E0] font-mono",
                }),

              )
            : h(

                  title: weightUpdatedAt ? `Last updated ${fmtTime(weightUpdatedAt)} on ${dayKey(new Date(weightUpdatedAt))} — stays until you change it` : undefined,

              ),
          editingHeight
            ? h(

                { className: "flex items-center gap-1" },
                h("input", {

            : h(

                  className: "flex items-center gap-1 text-xs font-mono text-[var(--text-muted)] hover:text-[var(--text-secondary)]",

      h(

        : h(

              { className: "flex items-center gap-2" },

                ALL_SECTIONS.filter((sec) => sec.id !== "sleep" || SLEEP_ENABLED).map((sec) =>

        h(

          showFeedWarning &&

      h(
