                                  (isSel ? "bg-[var(--pill-bg)] text-[var(--pill-text)] border-[var(--pill-bg)]" : "bg-[var(--surface-2)] border-[var(--surface-2-border)] text-[var(--text-secondary)]"),
                              },
                              lbl
                            );
                          }),
                          h("input", {
                            type: "date",
                            value: editDateKey,
                            max: dayKey(new Date()),
                            onChange: (ev) => setEditDateKey(ev.target.value),
                            className: "flex-1 bg-[var(--surface-2)] border border-[var(--surface-2-border)] rounded-lg px-2 text-xs text-[var(--text-primary)] outline-none font-mono",
                          })
                        ),
                        h(
                          "div",
                          { className: "flex items-center justify-center gap-1 bg-[var(--surface-2)] border border-[var(--surface-2-border)] rounded-lg py-1 mb-3" },
                          h(TimeWheelColumn, { values: Array.from({ length: 24 }, (_, hh) => hh), value: editHour, onChange: setEditHour, format: (v) => String(v).padStart(2, "0") }),
                          h("span", { className: "font-mono text-lg text-[var(--text-muted)]" }, ":"),
                          h(TimeWheelColumn, { values: Array.from({ length: 12 }, (_, i) => i * 5), value: editMinute, onChange: setEditMinute, format: (v) => String(v).padStart(2, "0") })
                        ),
                        h(
                          "div",
                          { className: "flex gap-2" },
                          h("button", { onClick: () => setEditingEntryId(null), className: "flex-1 py-2 rounded-lg text-xs bg-[var(--surface-2)] border border-[var(--surface-2-border)] text-[var(--text-secondary)]" }, "Cancel"),
                          h("button", { onClick: saveEditEntry, className: "flex-1 py-2 rounded-lg text-xs font-semibold bg-[#F2C879] text-[#14162B]" }, "Save")
                        )
                      )
                    : h(
                    "div",
                    { key: e.id, className: "flex items-center gap-3 px-4 py-2.5" },
                    h("span", { className: "w-2 h-2 rounded-full flex-shrink-0", style: { background: entryTypeColor(e) } }),
                    h(
                      "div",
                      { className: "flex-1 min-w-0" },
                      h("p", { className: "text-sm font-mono" }, fmtTime(e.time)),
                      h(
                        "p",
                        { className: "text-xs text-[var(--text-muted)]" },
                        e.type === "mixed" ? `${e.breastMl || 0}ml breast + ${e.formulaMl || 0}ml formula` : `${e.volumeMl} ml`,
                        e.gapMins != null && h("span", null, ` · +${fmtDuration(e.gapMins)}`)
                      )
                    ),
                    confirmingDeleteId === e.id
                      ? h(
                          "div",
                          { className: "flex items-center gap-1.5 flex-shrink-0" },
                          h(
                            "button",
                            {
                            onClick: () => handleDelete(e.id),
                            className: "bg-[#E08A8A] text-[#14162B] text-xs font-semibold rounded-full px-2.5 py-1.5 transition-colors",
                            "aria-label": "Confirm delete",
                          },
                          "Delete?"
                        ),
                        h(
                          "button",
                          {
                            onClick: () => setConfirmingDeleteId(null),
                            className: "bg-[var(--card-border)] text-[var(--text-tertiary)] rounded-full p-1.5 transition-colors",
                            "aria-label": "Cancel delete",
                          },
                          h(Icon, { name: "close", size: 14 })
                        )
                      )
                    : h(
                        "div",
                        { className: "flex items-center gap-1.5 flex-shrink-0" },
                        h(
                          "button",
                          {
                            onClick: () => startEditEntry(e),
                            className: "bg-[var(--card-border)] hover:bg-[#3A3550] text-[var(--text-tertiary)] hover:text-[var(--text-primary)] rounded-full p-2.5 transition-colors",
                            "aria-label": "Edit entry",
                          },
                          h(Icon, { name: "edit", size: 14 })
                        ),
                        h(
                          "button",
                          {
                            onClick: () => setConfirmingDeleteId(e.id),
                            className: "bg-[var(--card-border)] hover:bg-[#3A1F2E] text-[var(--text-tertiary)] hover:text-[#E08A8A] rounded-full p-2.5 transition-colors",
                            "aria-label": "Delete entry",
                          },
                          h(Icon, { name: "close", size: 14 })
                        )
                      )
                )
              )
            )
          );
        }),
        historyKeys.length > visibleDayCount &&
          h(
            "button",
            {
              onClick: () => setVisibleDayCount((v) => v + 7),
              className: "w-full text-center text-xs font-mono text-[#8FA8E0] bg-[var(--card-bg)] border border-[var(--card-border)] rounded-xl py-2.5 mt-1",
            },
            `Show 7 more days (${historyKeys.length - visibleDayCount} more available)`
          )
      )
      ),

      SLEEP_ENABLED && activeTab === "sleep" && h(SleepTab, {
        isAsleep, sleepStatusMins, sleepStatusColor, showWakeWarning, ongoingSleep, lastCompletedSleep,
        todaySleepTotalMins, todayNapCount, todayLongestStretchMins,
        sleepTrendData, selectedSleepTrendDay, setSelectedSleepTrendDay,
        avgNapsPerDay7, avgNapDurationMins7, longestStretchMins7, avgWakeWindowMins7,
        sleepDayMins, sleepNightMins, sleepDayPct,
        sleepBucketData, currentBucketIndex,
        sleepHistoryKeys, sleepHistoryByDay, visibleSleepDayCount, setVisibleSleepDayCount,
        expandedSleepDays, setExpandedSleepDays,
        confirmingDeleteSleepId, setConfirmingDeleteSleepId, handleDeleteSleep,
        toggleSleep, sleepSubmitting,
        loggingPastSleep, setLoggingPastSleep,
        sleepStartDateKey, setSleepStartDateKey, sleepStartHour, setSleepStartHour, sleepStartMinute, setSleepStartMinute,
        sleepEndDateKey, setSleepEndDateKey, sleepEndHour, setSleepEndHour, sleepEndMinute, setSleepEndMinute,
        handleAddPastSleep, error,
        sleepInsightText, sleepInsightLoading, sleepInsightError, sleepInsightGeneratedAt, refreshSleepInsight,
        insightsEnabled, groqKeyDraft, setGroqKeyDraft, saveGroqApiKey,
        editingSleepId, startEditSleep, saveEditSleep, setEditingSleepId,
        editSleepStartDateKey, setEditSleepStartDateKey, editSleepStartHour, setEditSleepStartHour, editSleepStartMinute, setEditSleepStartMinute,
        editSleepEndDateKey, setEditSleepEndDateKey, editSleepEndHour, setEditSleepEndHour, editSleepEndMinute, setEditSleepEndMinute,
      }),

      activeTab === "poop" && h(DiaperTab, {
        lastDiaper, minutesSinceLastDiaper, todayDiaperCount, todayPoopCount, avgPoopsPerDay7,
        diaperTrendData, diaperBucketData, currentBucketIndex,
        diaperStatus, setDiaperStatus, diaperCause, setDiaperCause,
        diaperConsistency, setDiaperConsistency, diaperColor, setDiaperColor,
        loggingPastDiaper, setLoggingPastDiaper,
        diaperDateKey, setDiaperDateKey, diaperHour, setDiaperHour, diaperMinute, setDiaperMinute,
        handleAddDiaper, diaperSubmitting, error,
        diaperHistoryKeys, diaperHistoryByDay, visibleDiaperDayCount, setVisibleDiaperDayCount,
        expandedDiaperDays, setExpandedDiaperDays,
        confirmingDeleteDiaperId, setConfirmingDeleteDiaperId, handleDeleteDiaper,
        editingDiaperId, startEditDiaper, saveEditDiaper, setEditingDiaperId,
        editDiaperStatus, setEditDiaperStatus, editDiaperCause, setEditDiaperCause,
        editDiaperConsistency, setEditDiaperConsistency, editDiaperColor, setEditDiaperColor,
        editDiaperDateKey, setEditDiaperDateKey, editDiaperHour, setEditDiaperHour, editDiaperMinute, setEditDiaperMinute,
      }),

      activeTab === "tummy" && h(TummyTab, {
        isTummyInProgress, tummyStatusSecs, minutesSinceLastTummy, ongoingTummy, lastCompletedTummy,
        todayTummyTotalSecs, todayTummyCount,
        tummyTrendData, selectedTummyTrendDay, setSelectedTummyTrendDay,
        avgTummySessionsPerDay7, avgTummyMinsPerDay7,
        tummyBucketData, currentBucketIndex, tummyGuidanceLine,
        toggleTummy, tummySubmitting,
        loggingPastTummy, setLoggingPastTummy,
        tummyStartDateKey, setTummyStartDateKey, tummyStartHour, setTummyStartHour, tummyStartMinute, setTummyStartMinute,
        tummyEndDateKey, setTummyEndDateKey, tummyEndHour, setTummyEndHour, tummyEndMinute, setTummyEndMinute,
        handleAddPastTummy, error,
        tummyHistoryKeys, tummyHistoryByDay, visibleTummyDayCount, setVisibleTummyDayCount,
        expandedTummyDays, setExpandedTummyDays,
        confirmingDeleteTummyId, setConfirmingDeleteTummyId, handleDeleteTummy,
        editingTummyId, startEditTummy, saveEditTummy, setEditingTummyId,
        editTummyStartDateKey, setEditTummyStartDateKey, editTummyStartHour, setEditTummyStartHour, editTummyStartMinute, setEditTummyStartMinute,
        editTummyEndDateKey, setEditTummyEndDateKey, editTummyEndHour, setEditTummyEndHour, editTummyEndMinute, setEditTummyEndMinute,
      }),

      activeTab === "vaccines" && h(VaccineTab, {
        upcomingVaccines, nextUpcomingVaccine, nextUpcomingIsOverdue, nextUpcomingDaysAway,
        givenVaccines, error,
        vaccineName, setVaccineName, vaccineDose, setVaccineDose, vaccineStatus, setVaccineStatus,
        vaccineDate, setVaccineDate, vaccineManufacturer, setVaccineManufacturer,
        vaccineLocation, setVaccineLocation, vaccineNotes, setVaccineNotes, vaccineNextDue, setVaccineNextDue,
        handleAddVaccine, vaccineSubmitting,
        confirmingDeleteVaccineId, setConfirmingDeleteVaccineId, handleDeleteVaccine,
        editingVaccineId, startEditVaccine, saveEditVaccine, setEditingVaccineId,
        editVaccineName, setEditVaccineName, editVaccineDose, setEditVaccineDose, editVaccineStatus, setEditVaccineStatus,
        editVaccineDate, setEditVaccineDate, editVaccineManufacturer, setEditVaccineManufacturer,
        editVaccineLocation, setEditVaccineLocation, editVaccineNotes, setEditVaccineNotes, editVaccineNextDue, setEditVaccineNextDue,
      }),

      activeTab === "growth" && h(GrowthTab, {
        growthRecords, error,
        growthDate, setGrowthDate, growthWeightInput, setGrowthWeightInput, growthHeightInput, setGrowthHeightInput,
        handleAddGrowth, growthSubmitting,
        confirmingDeleteGrowthId, setConfirmingDeleteGrowthId, handleDeleteGrowth,
        editingGrowthId, startEditGrowth, saveEditGrowth, setEditingGrowthId,
        editGrowthDate, setEditGrowthDate, editGrowthWeight, setEditGrowthWeight, editGrowthHeight, setEditGrowthHeight,
      })
      ) /* closes tab-enter wrapper */
    ),

    /* Floating chat bubble — dashboard only, since on detail views it would
       float directly over the right-edge edit/delete buttons in history
       lists while scrolling. The chat itself is still reachable from any
       tab by going back home first (one tap via the back arrow).
       Temporarily disabled via CHAT_ENABLED — see note near APP_VERSION. */
    CHAT_ENABLED && activeTab === "home" && !chatOpen &&
      h(
        "button",
        {
          onClick: () => setChatOpen(true),
          className: "fixed bottom-5 right-5 z-30 w-14 h-14 rounded-full shadow-xl flex items-center justify-center active:scale-95 transition-transform",
          style: { background: "#F2C879", color: "#14162B" },
          "aria-label": "Ask about your baby",
        },
        h(Icon, { name: "chat", size: 24 })
      ),

    /* Success toast — quiet confirmation after a save, not a modal, never blocks input */
    h(
      "div",
      {
        className: "fixed top-4 left-1/2 z-50 transition-all duration-300 pointer-events-none",
        style: {
          transform: actionFeedbackVisible ? "translate(-50%, 0)" : "translate(-50%, -14px)",
          opacity: actionFeedbackVisible ? 1 : 0,
        },
      },
      actionFeedback &&
        h(
          "div",
          { className: "flex items-center gap-2 px-4 py-2 rounded-full shadow-lg text-sm font-medium", style: { background: actionFeedback.color, color: "#14162B" } },
          h(Icon, { name: "check", size: 15, strokeWidth: 2.5 }),
          actionFeedback.message
        )
    ),

    CHAT_ENABLED && chatOpen &&
      h(
        "div",
        {
          className: "fixed inset-0 z-40 bg-black/50 flex items-end sm:items-center justify-center",
          onClick: (e) => { if (e.target === e.currentTarget) setChatOpen(false); },
        },
        h(
          "div",
          { className: "bg-[var(--bg)] w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl flex flex-col overflow-hidden", style: { height: "85vh", maxHeight: 700 } },
          h(
            "div",
            { className: "flex items-center justify-between px-4 py-3 border-b border-[var(--card-border)] flex-shrink-0" },
            h("p", { className: "text-lg", style: { fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600 } }, "Ask about your baby"),
            h(
              "button",
              { onClick: () => setChatOpen(false), className: "text-[var(--text-muted)] p-1.5 rounded-full hover:bg-[var(--surface-2)]", "aria-label": "Close chat" },
              h(Icon, { name: "close", size: 18 })
            )
          ),
          h(
            "div",
            { ref: chatScrollRef, className: "flex-1 overflow-y-auto px-4 py-3", style: { overscrollBehavior: "contain" } },
            chatMessages.length === 0 &&
              h(
                "div",
                { className: "mt-8 px-2" },
                h(
                  "p",
                  { className: "text-sm text-[var(--text-muted)] text-center mb-4 px-2" },
                  "Ask anything about your baby's feeding and growth — or general questions about this age. Not a substitute for your pediatrician."
                ),
                h(
                  "div",
                  { className: "flex flex-col gap-2" },
                  quickQuestions.map((q) =>
                    h(
                      "button",
                      {
                        key: q,
                        onClick: () => sendChatMessage(q),
                        className: "text-left px-3.5 py-2.5 rounded-xl text-sm bg-[var(--surface-2)] border border-[var(--surface-2-border)] text-[var(--text-secondary)] active:scale-[0.98] transition-transform",
                      },
                      q
                    )
                  )
                )
              ),
            chatMessages.map((m, i) =>
              h(
                "div",
                { key: i, className: "flex mb-2.5 " + (m.role === "user" ? "justify-end" : "justify-start") },
                h(
                  "div",
                  {
                    className: "max-w-[85%] rounded-2xl px-3.5 py-2 text-sm leading-relaxed " +
                      (m.role === "user" ? "bg-[var(--pill-bg)] text-[var(--pill-text)]" : "bg-[var(--card-bg)] border border-[var(--card-border)] text-[var(--text-primary)]"),
                  },
                  renderBoldText(m.content)
                )
              )
            ),
            chatSubmitting &&
              h(
                "div",
                { className: "flex justify-start mb-2.5" },
                h(
                  "div",
                  { className: "bg-[var(--card-bg)] border border-[var(--card-border)] rounded-2xl px-3.5 py-2.5" },
                  h(Icon, { name: "refresh", size: 15, className: "animate-spin text-[var(--text-muted)]" })
                )
              )
          ),
          chatError && h("p", { className: "text-xs text-[#E86A5C] px-4 pb-2 flex-shrink-0" }, chatError),
          !insightsEnabled &&
            h(
              "div",
              { className: "px-4 pb-3 flex-shrink-0" },
              h(GroqKeySetup, { groqKeyDraft, setGroqKeyDraft, saveGroqApiKey })
            ),
          h(ChatInputBar, { onSend: sendChatMessage, disabled: chatSubmitting })
        )
      )
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
